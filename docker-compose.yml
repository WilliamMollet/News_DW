# =============================================================================
# TP autonome — Pipeline Lakehouse + Airflow + Dashboard métier
# Stack : MinIO (bronze/silver) + PostgreSQL DW (silver/gold) +
#         Airflow LocalExecutor (metadata DB PostgreSQL dédiée) + Metabase
#
# Démarrage :  docker compose up -d
# UI Airflow : http://localhost:8080   (airflow / airflow)
# MinIO :      http://localhost:9001   (minio / minio12345)
# Metabase :   http://localhost:3000   (setup au premier lancement)
# =============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Europe/Paris
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Dépendances Python du pipeline (OK pour un TP ; en prod on bake une image)
    _PIP_ADDITIONAL_REQUIREMENTS: "minio==7.2.7 requests==2.32.3"
    # --- Variables utilisées par vos DAGs (accessibles via os.environ) ---
    NOOZRA_BASE_URL: https://noozra.com/api
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minio
    MINIO_SECRET_KEY: minio12345
    DW_CONN: postgresql://dw:dw@postgres-dw:5432/newsdw
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres-airflow:
      condition: service_healthy
    minio:
      condition: service_healthy
    postgres-dw:
      condition: service_healthy

services:

  # ---------------------------------------------------------------------------
  # 1) Metadata DB PostgreSQL DÉDIÉE à Airflow (exigence : pas de SQLite)
  # ---------------------------------------------------------------------------
  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pg-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 2) PostgreSQL Data Warehouse : zones silver + gold (schéma en étoile),
  #    logs métier, quarantaine — + base applicative de Metabase
  # ---------------------------------------------------------------------------
  postgres-dw:
    image: postgres:16
    container_name: postgres-dw
    environment:
      POSTGRES_USER: dw
      POSTGRES_PASSWORD: dw
      POSTGRES_DB: newsdw
    ports:
      - "5433:5432"          # exposé pour vos requêtes SQL d'idempotence
    volumes:
      - pg-dw-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d   # crée schémas + base metabase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw -d newsdw"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 3) MinIO : zone bronze (JSON brut) et fichiers silver éventuels
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  # Création automatique des buckets bronze / silver / gold au démarrage
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      mc mb --ignore-existing local/bronze &&
      echo 'Bucket bronze OK (silver/gold vivent dans postgres-dw)'
      "

  # ---------------------------------------------------------------------------
  # 4) Airflow — LocalExecutor (parallélisme des extractions par catégorie)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow --password airflow \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    environment:
      <<: *airflow-common-env
      _PIP_ADDITIONAL_REQUIREMENTS: ""   # inutile pour l'init, gagne du temps
    depends_on:
      postgres-airflow:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 5) Metabase — dashboard métier, branché sur postgres-dw (schéma gold)
  # ---------------------------------------------------------------------------
  metabase:
    image: metabase/metabase:v0.52.8
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres-dw
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: dw
      MB_DB_PASS: dw
    depends_on:
      postgres-dw:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

volumes:
  pg-airflow-data:
  pg-dw-data:
  minio-data: